<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRB PHARMA - Sistema de Almacenamiento</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; }
        input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.3) sepia(1) saturate(3) hue-rotate(190deg); }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:#e0f2fe; }
        ::-webkit-scrollbar-thumb { background:#93c5fd; border-radius:3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const TOTAL_FILAS   = 50;
        const TOTAL_NIVELES = 6;
        const FILAS   = Array.from({ length: TOTAL_FILAS   }, (_, i) => i + 1);
        const NIVELES = Array.from({ length: TOTAL_NIVELES }, (_, i) => i + 1);
        const UNIDADES = ["kg", "g"];
        const EMPTY_FORM = { codigo:"", nombre:"", nroAnalisis:"", cantidad:"", unidad:"kg", fechaVencimiento:"" };
        const HOY = new Date().toISOString().slice(0, 10);

        function diasParaVencer(fecha) {
            if (!fecha) return null;
            return Math.ceil((new Date(fecha) - new Date(HOY)) / 86400000);
        }

        function estadoVencimiento(fecha) {
            const d = diasParaVencer(fecha);
            if (d === null) return null;
            if (d < 0)   return { color:"#dc2626", bg:"#fee2e2", border:"#fca5a5" };
            if (d <= 30) return { color:"#d97706", bg:"#fef3c7", border:"#fcd34d" };
            return               { color:"#16a34a", bg:"#dcfce7", border:"#86efac" };
        }

        function parseFechaVoz(texto) {
            const meses = { enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12 };
            const t = texto.toLowerCase().trim();
            const numMatch = t.match(/(\d{1,2})[\/\-\s](\d{1,2})[\/\-\s](\d{4})/);
            if (numMatch) { const [,d,m,y]=numMatch; return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`; }
            const verbalMatch = t.match(/(\d{1,2})\s+(?:de\s+)?([a-záéíóú]+)\s+(?:de\s+)?(\d{4})/);
            if (verbalMatch) { const [,d,mes,y]=verbalMatch; const m=meses[mes];
            if(m) return `${y}-${String(m).padStart(2,"0")}-${d.padStart(2,"0")}`; }
            return null;
        }

        function parseCantidadVoz(texto) {
            const t = texto.toLowerCase();
            const unidad = t.includes(" g")||t.includes("gramo") ? "g" : "kg";
            const numMatch = t.match(/[\d]+([.,]\d+)?/);
            return { cantidad: numMatch ? numMatch[0].replace(",",".") : t.replace(/[^0-9.,]/g,"").replace(",","."), unidad };
        }

        function validarCodigo(v)      { return /^\d{4}$/.test(v.trim()); }
        function validarNroAnalisis(v) { return /^\d{6}$/.test(v.trim()); }

        const INITIAL_PALLETS = [
            { fila:1,  nivel:1, codigo:"0012", nombre:"Lactosa monohidrato",      nroAnalisis:"202401", cantidad:"25",  unidad:"kg", fechaVencimiento:"2026-12-01" },
            { fila:1,  nivel:2, codigo:"0034", nombre:"Celulosa microcristalina", nroAnalisis:"202402", cantidad:"500", unidad:"g",  fechaVencimiento:"2026-06-15" },
            { fila:2,  nivel:1, codigo:"0056", nombre:"Almidón de maíz",          nroAnalisis:"202403", cantidad:"10",  unidad:"kg", fechaVencimiento:"2027-03-10" },
            { fila:3,  nivel:2, codigo:"0078", nombre:"Estearato de magnesio",    nroAnalisis:"202404", cantidad:"200", unidad:"g",  fechaVencimiento:"2026-04-30" },
        ];

        function QRDisplay({ value, size=160 }) {
            const hash = value.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
            const cells=21, cell=size/cells;
            const bits = Array.from({length:cells*cells},(_,i)=>{
                const r=Math.floor(i/cells),c=i%cells;
                return {r,c,on:((hash*(r*cells+c+1)*31337)%256)>128};
            });
            return (
                <svg width={size} height={size}>
                    <rect width={size} height={size} fill="white"/>
                    {bits.map(({r,c,on})=>on&&<rect key={`${r}-${c}`} x={c*cell} y={r*cell} width={cell} height={cell} fill="#1e3a5f"/>)}
                    {[[0,0],[0,cells-7],[cells-7,0]].map(([row,col],i)=>(
                        <g key={i}>
                            <rect x={col*cell} y={row*cell} width={7*cell} height={7*cell} fill="#1e3a5f"/>
                            <rect x={(col+1)*cell} y={(row+1)*cell} width={5*cell} height={5*cell} fill="white"/>
                            <rect x={(col+2)*cell} y={(row+2)*cell} width={3*cell} height={3*cell} fill="#1e3a5f"/>
                        </g>
                    ))}
                </svg>
            );
        }

        function useVoice(onResult, lang="es-AR") {
            const recogRef = useRef(null);
            const [listening, setListening] = useState(false);
            const [supported, setSupported] = useState(false);
            useEffect(() => {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                setSupported(!!SR);
                if (!SR) return;
                const r = new SR();
                r.lang = lang; r.continuous = false; r.interimResults = false;
                r.onresult = e => { onResult(e.results[0][0].transcript); setListening(false); };
                r.onerror  = () => setListening(false);
                r.onend    = () => setListening(false);
                recogRef.current = r;
            }, []);
            const start = useCallback(() => { if(!recogRef.current) return; setListening(true); recogRef.current.start(); }, []);
            const stop  = useCallback(() => { if(!recogRef.current) return; recogRef.current.stop(); setListening(false); }, []);
            return { listening, supported, start, stop };
        }

        function MicBtn({ onResult, field, activeField, setActiveField }) {
            const { listening, supported, start, stop } = useVoice(text => { onResult(field, text); setActiveField(null); });
            if (!supported) return null;
            function toggle() { if (listening) { stop(); setActiveField(null); } else { start(); setActiveField(field); } }
            return (
                <button type="button" onClick={toggle} title={listening?"Detener":"Dictar por voz"}
                    style={{ ...s.micBtn, background: listening?"#dc2626":"#1e40af", border: `1px solid ${listening?"#dc2626":"#3b82f6"}`, animation: listening?"pulse 1s infinite":"none" }}>
                    {listening ? "⏹" : "🎙"}
                </button>
            );
        }

        function App() {
            const [pallets, setPallets]         = useState(INITIAL_PALLETS);
            const [view, setView]               = useState("mapa");
            const [mapPage, setMapPage]         = useState(0);
            const [modalPos, setModalPos]       = useState(null);
            const [editForm, setEditForm]       = useState(null);
            const [search, setSearch]           = useState("");
            const [qrData, setQrData]           = useState(null);
            const [toast, setToast]             = useState(null);
            const [activeField, setActiveField] = useState(null);
            const [voiceLog, setVoiceLog]       = useState("");
            const [formErrors, setFormErrors]   = useState({});

            const FILAS_PER_PAGE = 10;
            const totalPages     = Math.ceil(TOTAL_FILAS / FILAS_PER_PAGE);
            const filasVisible   = FILAS.slice(mapPage * FILAS_PER_PAGE, (mapPage + 1) * FILAS_PER_PAGE);
            const totalSlots     = TOTAL_FILAS * TOTAL_NIVELES;
            const ocupadas       = pallets.length;
            const libres         = totalSlots - ocupadas;
            const pctOcup        = Math.round(ocupadas / totalSlots * 100);
            const pctLibre       = 100 - pctOcup;

            function showToast(msg, type="ok") { setToast({msg,type}); setTimeout(()=>setToast(null),2800); }
            function getPallet(fila, nivel)    { return pallets.find(p=>p.fila===fila&&p.nivel===nivel)||null; }

            function openModal(fila, nivel) {
                const p = getPallet(fila, nivel);
                setModalPos({fila,nivel});
                setEditForm(p ? {...p} : {...EMPTY_FORM, fila, nivel});
                setVoiceLog(""); setActiveField(null); setFormErrors({});
            }

            function saveModal() {
                const {fila,nivel} = modalPos;
                const hasData = editForm.codigo||editForm.nombre||editForm.nroAnalisis||editForm.cantidad;
                const errors = {};
                if (hasData) {
                    if (!editForm.codigo)                  errors.codigo      = "Requerido";
                    else if (!validarCodigo(editForm.codigo)) errors.codigo   = "Debe ser 4 dígitos";
                    if (editForm.nroAnalisis && !validarNroAnalisis(editForm.nroAnalisis)) errors.nroAnalisis = "Debe ser 6 dígitos";
                }
                if (Object.keys(errors).length) { setFormErrors(errors); showToast("Revisá los campos marcados","err"); return; }
                setPallets(prev => {
                    const rest = prev.filter(p=>!(p.fila===fila&&p.nivel===nivel));
                    return hasData ? [...rest, {...editForm,fila,nivel}] : rest;
                });
                setModalPos(null);
                showToast(hasData ? "Posición guardada ✓" : "Posición liberada");
            }

            function deleteFromModal() {
                const {fila,nivel}=modalPos;
                setPallets(prev=>prev.filter(p=>!(p.fila===fila&&p.nivel===nivel)));
                setModalPos(null); showToast("Posición liberada");
            }

            function handleVoiceResult(field, text) {
                setVoiceLog(`🎙 "${text}"`);
                if (field==="fechaVencimiento") {
                    const fecha = parseFechaVoz(text);
                    if (fecha) { setEditForm(f=>({...f,fechaVencimiento:fecha})); return; }
                    showToast("No pude interpretar la fecha. Intentá: '15 de junio de 2027'","err"); return;
                }
                if (field==="cantidad") {
                    const {cantidad,unidad} = parseCantidadVoz(text);
                    setEditForm(f=>({...f,cantidad,unidad})); return;
                }
                if (field==="codigo")      { const d=text.replace(/\D/g,"").slice(0,4).padStart(4,"0"); setEditForm(f=>({...f,codigo:d})); return; }
                if (field==="nroAnalisis") { const d=text.replace(/\D/g,"").slice(0,6).padStart(6,"0"); setEditForm(f=>({...f,nroAnalisis:d})); return; }
                setEditForm(f=>({...f,[field]:text.trim()}));
            }

            const filteredPallets = pallets.filter(p =>
                !search ||
                p.codigo?.includes(search) ||
                p.nombre?.toLowerCase().includes(search.toLowerCase()) ||
                p.nroAnalisis?.includes(search) ||
                `${p.fila}.${p.nivel}`.includes(search)
            );
            const vencProximos = [...pallets].filter(p=>p.fechaVencimiento).sort((a,b)=>a.fechaVencimiento.localeCompare(b.fechaVencimiento)).slice(0,8);

            return (
                <div style={s.root}>
                    <header style={s.header}>
                        <div style={s.headerInner}>
                            <div style={s.logoWrap}>
                                <div style={s.logoCircle}>⚗</div>
                                <div>
                                    <div style={s.logoText}>TRB PHARMA</div>
                                    <div style={s.logoSub}>Sistema de Almacenamiento · Central de Pesadas</div>
                                </div>
                            </div>
                            <nav style={s.nav}>
                                {[["mapa","🗺 Mapa"],["lista","☰ Lista"],["analisis","📊 Análisis"]].map(([v,label])=>(
                                    <button key={v} onClick={()=>setView(v)} style={{...s.navBtn,...(view===v?s.navBtnActive:{})}}>
                                        {label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    {toast && (
                        <div style={{...s.toast, background:toast.type==="err"?"#dc2626":"#16a34a"}}>
                            {toast.msg}
                        </div>
                    )}

                    <main style={s.main}>
                        {view==="mapa" && (
                            <div>
                                <div style={s.kpiRow}>
                                    {[
                                        { num:ocupadas,  label:"Posiciones ocupadas",  pct:pctOcup,  color:"#1d4ed8", light:"#dbeafe", icon:"📦" },
                                        { num:libres,    label:"Posiciones disponibles",pct:pctLibre, color:"#16a34a", light:"#dcfce7", icon:"✅" },
                                        { num:pallets.filter(p=>{const d=diasParaVencer(p.fechaVencimiento);return d!==null&&d>=0&&d<=30;}).length, label:"Vencen en ≤30 días", pct:null, color:"#d97706", light:"#fef3c7", icon:"⚠️" },
                                        { num:pallets.filter(p=>{const d=diasParaVencer(p.fechaVencimiento);return d!==null&&d<0;}).length, label:"Materias vencidas", pct:null, color:"#dc2626", light:"#fee2e2", icon:"🚫" },
                                    ].map(({num,label,pct,color,light,icon})=>(
                                        <div key={label} style={{...s.kpiCard, borderTop:`4px solid ${color}`}}>
                                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                                                <div>
                                                    <div style={{...s.kpiNum, color}}>{num}</div>
                                                    <div style={s.kpiLabel}>{label}</div>
                                                </div>
                                                <div style={{...s.kpiIcon, background:light}}>{icon}</div>
                                            </div>
                                            {pct!=null && (
                                                <div style={{marginTop:10}}>
                                                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                                                        <span style={{fontSize:10,color:"#64748b"}}>Ocupación</span>
                                                        <span style={{fontSize:10,fontWeight:700,color}}>{pct}%</span>
                                                    </div>
                                                    <div style={s.kpiBar}><div style={{...s.kpiBarFill,width:`${pct}%`,background:color}}/></div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div style={s.sectionCard}>
                                    <div style={s.sectionCardHeader}>
                                        <div style={s.sectionTitle}>🗺 Mapa de posiciones</div>
                                        <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                                            <span style={s.pageLabel}>Filas {mapPage*FILAS_PER_PAGE+1}–{Math.min((mapPage+1)*FILAS_PER_PAGE,TOTAL_FILAS)}</span>
                                            <button onClick={()=>setMapPage(p=>Math.max(0,p-1))} disabled={mapPage===0} style={s.pageBtn}>‹</button>
                                            {Array.from({length:totalPages},(_,i)=>(
                                                <button key={i} onClick={()=>setMapPage(i)} style={{...s.pageBtn,...(mapPage===i?s.pageBtnActive:{})}}>
                                                    F{i*FILAS_PER_PAGE+1}
                                                </button>
                                            ))}
                                            <button onClick={()=>setMapPage(p=>Math.min(totalPages-1,p+1))} disabled={mapPage===totalPages-1} style={s.pageBtn}>›</button>
                                        </div>
                                    </div>

                                    <div style={{overflowX:"auto"}}>
                                        <div style={s.gridHeader}>
                                            <div style={s.filaLabel}/>
                                            {NIVELES.map(n=>(
                                                <div key={n} style={s.nivelHeader}><div style={s.nivelHeaderBadge}>N{n}</div></div>
                                            ))}
                                        </div>
                                        {filasVisible.map(fila=>(
                                            <div key={fila} style={{...s.gridFila, background: fila%2===0?"#f0f9ff":"#ffffff"}}>
                                                <div style={s.filaLabel}><span style={s.filaNum}>F{fila}</span></div>
                                                {NIVELES.map(nivel=>{
                                                    const p = getPallet(fila,nivel);
                                                    const d = p ? diasParaVencer(p.fechaVencimiento) : null;
                                                    let slotBg="#e0f2fe", slotBorder="#bae6fd", slotColor="#0369a1";
                                                    if (p) {
                                                        if (d!==null&&d<0)   { slotBg="#fee2e2"; slotBorder="#fca5a5"; slotColor="#dc2626"; }
                                                        else if (d!==null&&d<=30) { slotBg="#fef3c7"; slotBorder="#fcd34d"; slotColor="#b45309"; }
                                                        else                 { slotBg="#dbeafe"; slotBorder="#93c5fd"; slotColor="#1d4ed8"; }
                                                    }
                                                    return (
                                                        <button key={nivel} onClick={()=>openModal(fila,nivel)}
                                                            title={p?`${p.codigo} · ${p.nombre}`:`F${fila}.N${nivel} · Libre`}
                                                            style={{...s.slot, background:slotBg, border:`1.5px solid ${slotBorder}`, color:slotColor}}>
                                                            {p ? <><div style={s.slotCode}>{p.codigo}</div><div style={s.slotName}>{p.nombre?.slice(0,10)}</div></> : <div style={s.slotFree}>+</div>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        ))}
                                    </div>
                                    <div style={s.leyenda}>
                                        {[["#e0f2fe","#bae6fd","#0369a1","Disponible"], ["#dbeafe","#93c5fd","#1d4ed8","Ocupada"], ["#fef3c7","#fcd34d","#b45309","Vence ≤30d"], ["#fee2e2","#fca5a5","#dc2626","Vencida"]].map(([bg,bd,color,label])=>(
                                            <div key={label} style={s.leyendaItem}>
                                                <div style={{width:12,height:12,borderRadius:3,background:bg,border:`1.5px solid ${bd}`}}/>
                                                <span style={{fontSize:11}}>{label}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view==="lista" && (
                            <div style={s.sectionCard}>
                                <div style={s.sectionCardHeader}>
                                    <div style={s.sectionTitle}>☰ Materias primas almacenadas</div>
                                </div>
                                <input placeholder="🔍 Buscar..." value={search} onChange={e=>setSearch(e.target.value)} style={s.searchInput}/>
                                <div style={s.lista}>
                                    {filteredPallets.map(p=>{
                                        const venc=estadoVencimiento(p.fechaVencimiento);
                                        const dias=diasParaVencer(p.fechaVencimiento);
                                        return (
                                            <div key={`${p.fila}-${p.nivel}`} style={s.listaItem} onClick={()=>openModal(p.fila,p.nivel)}>
                                                <div style={s.listaPosBox}><div style={s.listaPosF}>F{p.fila}</div><div style={s.listaPosN}>N{p.nivel}</div></div>
                                                <div style={s.listaInfo}>
                                                    <div style={s.listaNombre}>{p.nombre||"—"}</div>
                                                    <div style={s.listaMeta}>🏷 {p.codigo} · 🔬 {p.nroAnalisis||"—"} · ⚖ {p.cantidad} {p.unidad}</div>
                                                </div>
                                                {venc && <div style={{...s.vencBadge, color:venc.color, background:venc.bg, border:`1px solid ${venc.border}`}}>{dias<0?"VENC.":`${dias}d`}</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view==="analisis" && (
                            <div style={s.analGrid}>
                                <div style={s.analCard}>
                                    <div style={s.analTitle}>Ocupación del depósito</div>
                                    <div style={{fontSize:24, fontWeight:800, color:"#1d4ed8"}}>{pctOcup}%</div>
                                    <div style={s.kpiBar}><div style={{...s.kpiBarFill,width:`${pctOcup}%`,background:"#1d4ed8"}}/></div>
                                    <div style={{marginTop:10, fontSize:12, color:"#64748b"}}>{ocupadas} posiciones ocupadas de {totalSlots}</div>
                                </div>
                            </div>
                        )}
                    </main>

                    {modalPos && editForm && (
                        <div style={s.modalOverlay} onClick={e=>{if(e.target===e.currentTarget)setModalPos(null);}}>
                            <div style={s.modalBox}>
                                <div style={s.modalHeader}>
                                    <div style={s.modalTitle}>Posición F{modalPos.fila} · N{modalPos.nivel}</div>
                                    <button onClick={()=>setModalPos(null)} style={s.btnClose}>✕</button>
                                </div>
                                <div style={s.modalBody}>
                                    <div style={s.formGroup}>
                                        <label style={s.formLabel}>Código (4 dígitos)</label>
                                        <div style={s.inputRow}>
                                            <input maxLength={4} value={editForm.codigo||""} onChange={e=>setEditForm(f=>({...f,codigo:e.target.value.replace(/\D/g,"")}))} style={s.formInput}/>
                                            <MicBtn field="codigo" onResult={handleVoiceResult} activeField={activeField} setActiveField={setActiveField}/>
                                        </div>
                                    </div>
                                    <div style={s.formGroup}>
                                        <label style={s.formLabel}>Nombre</label>
                                        <div style={s.inputRow}>
                                            <input value={editForm.nombre||""} onChange={e=>setEditForm(f=>({...f,nombre:e.target.value}))} style={s.formInput}/>
                                            <MicBtn field="nombre" onResult={handleVoiceResult} activeField={activeField} setActiveField={setActiveField}/>
                                        </div>
                                    </div>
                                    <div style={s.formGroup}>
                                        <label style={s.formLabel}>N° Análisis (6 dígitos)</label>
                                        <div style={s.inputRow}>
                                            <input maxLength={6} value={editForm.nroAnalisis||""} onChange={e=>setEditForm(f=>({...f,nroAnalisis:e.target.value.replace(/\D/g,"")}))} style={s.formInput}/>
                                            <MicBtn field="nroAnalisis" onResult={handleVoiceResult} activeField={activeField} setActiveField={setActiveField}/>
                                        </div>
                                    </div>
                                    <div style={s.formGroup}>
                                        <label style={s.formLabel}>Fecha Vencimiento</label>
                                        <div style={s.inputRow}>
                                            <input type="date" value={editForm.fechaVencimiento||""} onChange={e=>setEditForm(f=>({...f,fechaVencimiento:e.target.value}))} style={s.formInput}/>
                                            <MicBtn field="fechaVencimiento" onResult={handleVoiceResult} activeField={activeField} setActiveField={setActiveField}/>
                                        </div>
                                    </div>
                                </div>
                                <div style={s.modalFooter}>
                                    <button onClick={deleteFromModal} style={s.btnDel}>Liberar</button>
                                    <button onClick={saveModal} style={s.btnSave}>Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const s = {
            root: { minHeight:"100vh", background:"#f0f9ff", color:"#1e293b", fontFamily:"sans-serif" },
            header: { background:"#1e3a5f", color:"#fff", padding:"10px 20px" },
            headerInner: { maxWidth:1200, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" },
            logoWrap: { display:"flex", alignItems:"center", gap:10 },
            logoCircle: { width:32, height:32, borderRadius:"50%", background:"rgba(255,255,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center" },
            logoText: { fontWeight:800 },
            logoSub: { fontSize:10, opacity:0.8 },
            nav: { display:"flex", gap:5 },
            navBtn: { background:"none", border:"none", color:"#fff", padding:"8px 12px", cursor:"pointer", borderRadius:6 },
            navBtnActive: { background:"rgba(255,255,255,0.2)" },
